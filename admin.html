<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoftReview — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#0A0A08;--card:#111110;--s2:#171714;--s3:#1C1C19;
      --b:rgba(240,237,232,0.08);--b2:rgba(240,237,232,0.14);
      --cream:#F0EDE8;--cs:rgba(240,237,232,0.12);
      --t1:#F0EDE8;--t2:#9C958A;--t3:#6B665E;
    }
    body{background:var(--bg);color:var(--t1);font-family:'Outfit',sans-serif;min-height:100vh}

    /* Header */
    .hdr{background:rgba(10,10,8,.97);border-bottom:1px solid var(--b);padding:0 32px;height:66px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99}
    .hdr-logo{display:flex;align-items:center;gap:10px}
    .hdr-box{width:38px;height:38px;background:var(--cream);color:#0A0A08;font-weight:900;font-size:.82rem;display:flex;align-items:center;justify-content:center;border-radius:10px;box-shadow:0 0 20px rgba(240,237,232,.2)}
    .hdr-name{font-size:1.15rem;font-weight:800}
    .hdr-pill{background:var(--cs);border:1px solid rgba(240,237,232,.25);color:var(--cream);font-size:.7rem;font-weight:800;padding:5px 14px;border-radius:99px;letter-spacing:.08em;text-transform:uppercase}
    .hdr-home{background:var(--s2);border:1px solid var(--b2);color:var(--t2);padding:8px 18px;border-radius:8px;text-decoration:none;font-size:.84rem;font-weight:600;transition:.2s}
    .hdr-home:hover{color:var(--t1)}

    /* Main */
    .main{max-width:1160px;margin:0 auto;padding:36px 32px}

    /* Offline banner */
    .offline-bar{background:var(--cs);border:1px solid rgba(240,237,232,.3);color:var(--cream);border-radius:10px;padding:14px 20px;margin-bottom:24px;font-size:.9rem;font-weight:600;display:none;text-align:center}

    /* Stats */
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:32px}
    .sc{background:var(--card);border:1px solid var(--b);border-radius:12px;padding:24px 20px}
    .sc strong{display:block;font-size:2rem;font-weight:900;letter-spacing:-.04em;margin-bottom:5px}
    .sc span{font-size:.72rem;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.1em}
    .sc:nth-child(1) strong{color:var(--cream)}
    .sc:nth-child(2) strong{color:var(--t1)}
    .sc:nth-child(3) strong{color:var(--cream)}
    .sc:nth-child(4) strong{color:var(--t2)}

    /* Filters */
    .frow{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:20px}
    .frow h2{font-size:1.2rem;font-weight:800}
    .ftabs{display:flex;gap:6px}
    .ftab{background:var(--s2);border:1px solid var(--b);color:var(--t2);padding:8px 18px;border-radius:99px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.83rem;font-weight:600;transition:.2s}
    .ftab.on,.ftab:hover{background:var(--cs);border-color:rgba(240,237,232,.35);color:var(--cream)}

    /* Review cards */
    .rlist{display:flex;flex-direction:column;gap:12px}
    .rcard{background:var(--card);border:1px solid var(--b);border-radius:12px;padding:22px 24px;transition:border-color .2s}
    .rcard:hover{border-color:var(--b2)}
    .rcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:12px;flex-wrap:wrap}
    .rcard-name{font-size:1rem;font-weight:800;color:var(--cream);margin-bottom:4px}
    .rcard-date{font-size:.79rem;color:var(--t3)}

    .bstat{font-size:.7rem;font-weight:800;padding:5px 14px;border-radius:99px;text-transform:uppercase;letter-spacing:.06em}
    .bstat.pending {background:var(--cs);color:var(--t1); border:1px solid rgba(240,237,232,.25)}
    .bstat.approved{background:var(--cs);           color:var(--cream);border:1px solid rgba(240,237,232,.25)}
    .bstat.rejected{background:rgba(240,237,232,0.06);color:var(--t2);  border:1px solid rgba(240,237,232,.2)}

    .sw-tag{display:inline-block;background:var(--cs);border:1px solid rgba(240,237,232,.25);color:var(--cream);font-size:.7rem;font-weight:700;padding:3px 12px;border-radius:99px;text-transform:uppercase;margin-bottom:8px}
    .rstars{color:var(--cream);font-size:.9rem;margin-bottom:8px}
    .rtext{font-size:.88rem;color:var(--t2);line-height:1.7;margin-bottom:10px}
    .remail{font-size:.8rem;color:var(--t3);margin-bottom:16px}
    .remail b{color:var(--t2)}

    .ract{display:flex;gap:8px;flex-wrap:wrap}
    .ba{background:var(--cs);border:1px solid rgba(240,237,232,.3);color:var(--cream);padding:9px 20px;border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.83rem;font-weight:700;transition:.2s}
    .ba:hover{background:var(--cream);color:#0A0A08}
    .br{background:rgba(240,237,232,0.06);border:1px solid rgba(240,237,232,.25);color:var(--t2);padding:9px 20px;border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.83rem;font-weight:700;transition:.2s}
    .br:hover{background:var(--s3);color:var(--cream);border-color:rgba(240,237,232,.3)}
    .bd{background:var(--s3);border:1px solid var(--b);color:var(--t3);padding:9px 20px;border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.83rem;font-weight:700;transition:.2s}
    .bd:hover{background:rgba(240,237,232,0.06);color:var(--cream);border-color:rgba(240,237,232,.3)}

    .empty{text-align:center;padding:70px 20px;color:var(--t3)}
    .empty .ico{font-size:3rem;margin-bottom:14px}
    .loading{text-align:center;padding:60px;color:var(--t3)}

    /* Toast */
    .toast{position:fixed;bottom:28px;right:28px;background:var(--card);border:1px solid var(--b2);border-radius:10px;padding:14px 22px;font-size:.88rem;font-weight:600;z-index:9999;transform:translateY(16px);opacity:0;transition:all .3s;pointer-events:none}
    .toast.show{transform:translateY(0);opacity:1}
    .toast.ok {border-color:rgba(240,237,232,.4);color:var(--cream)}
    .toast.bad{border-color:rgba(240,237,232,.25);color:var(--t2)}

    @media(max-width:768px){
      .stats{grid-template-columns:repeat(2,1fr)}
      .main,.hdr{padding:20px 18px}
    }
  </style>
</head>
<body>

<header class="hdr">
  <div class="hdr-logo">
    <div class="hdr-box">SR</div>
    <span class="hdr-name">SoftReview</span>
  </div>
  <span class="hdr-pill">Admin Panel</span>
  <a href="index.html" class="hdr-home">← Website</a>
</header>

<div class="main">

  <!-- Server offline warning -->
  <div class="offline-bar" id="offlineBar">
    ⚠️ Server nahi mila! Terminal mein yeh run karo: <strong>node server.js</strong>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="sc"><strong id="sT">—</strong><span>Total Reviews</span></div>
    <div class="sc"><strong id="sP">—</strong><span>Pending</span></div>
    <div class="sc"><strong id="sA">—</strong><span>Approved</span></div>
    <div class="sc"><strong id="sR">—</strong><span>Rejected</span></div>
  </div>

  <!-- Filter tabs -->
  <div class="frow">
    <h2>All Reviews</h2>
    <div class="ftabs">
      <button class="ftab on"  onclick="load('all',this)">All</button>
      <button class="ftab"     onclick="load('pending',this)">⏳ Pending</button>
      <button class="ftab"     onclick="load('approved',this)">✅ Approved</button>
      <button class="ftab"     onclick="load('rejected',this)">❌ Rejected</button>
    </div>
  </div>

  <!-- Reviews list -->
  <div class="rlist" id="rlist">
    <div class="loading">Loading reviews…</div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const API = 'http://localhost:3000/api';

  // Load on page open
  window.onload = function() {
    loadStats();
    load('all');
  };

  // Stats
  function loadStats() {
    fetch(API + '/admin/stats')
      .then(r => r.json())
      .then(d => {
        if (!d.success) return;
        document.getElementById('sT').textContent = d.stats.total;
        document.getElementById('sP').textContent = d.stats.pending;
        document.getElementById('sA').textContent = d.stats.approved;
        document.getElementById('sR').textContent = d.stats.rejected;
      })
      .catch(() => {
        document.getElementById('offlineBar').style.display = 'block';
      });
  }

  // Load reviews
  function load(status, btn) {
    if (btn) {
      document.querySelectorAll('.ftab').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
    }

    const list = document.getElementById('rlist');
    list.innerHTML = '<div class="loading">Loading…</div>';

    fetch(API + '/admin/reviews?status=' + status)
      .then(r => r.json())
      .then(d => {
        if (!d.success) { list.innerHTML = err('Error aaya!'); return; }
        if (!d.reviews.length) { list.innerHTML = empty(status); return; }
        list.innerHTML = d.reviews.map(r => card(r)).join('');
      })
      .catch(() => {
        list.innerHTML = `<div class="empty">
          <div class="ico">⚠️</div>
          <p><strong style="color:#F0EDE8">Server band hai!</strong><br><br>
          VS Code ka terminal kholke yeh likho:<br>
          <code style="color:#F97316;font-size:1rem">node server.js</code></p>
        </div>`;
        document.getElementById('offlineBar').style.display = 'block';
      });
  }

  // Render review card
  function card(r) {
    const stars = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
    const date  = new Date(r.createdAt).toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'});
    const appBtn = r.status !== 'approved' ? `<button class="ba" onclick="upd('${r.id}','approved')">✅ Approve</button>` : '';
    const rejBtn = r.status !== 'rejected' ? `<button class="br" onclick="upd('${r.id}','rejected')">❌ Reject</button>` : '';
    return `
    <div class="rcard" id="rc${r.id}">
      <div class="rcard-top">
        <div>
          <div class="rcard-name">${x(r.name)}</div>
          <div class="rcard-date">📅 ${date}</div>
        </div>
        <span class="bstat ${r.status}">${r.status.toUpperCase()}</span>
      </div>
      <span class="sw-tag">${x(r.software)}</span>
      <div class="rstars">${stars} &nbsp; ${r.rating}/5</div>
      <div class="rtext">${x(r.review)}</div>
      <div class="remail">📧 <b>${x(r.email)}</b></div>
      <div class="ract">
        ${appBtn}
        ${rejBtn}
        <button class="bd" onclick="del('${r.id}')">🗑️ Delete</button>
      </div>
    </div>`;
  }

  function empty(s) {
    return `<div class="empty"><div class="ico">📭</div><p>Koi ${s} review nahi hai</p></div>`;
  }

  function err(msg) {
    return `<div class="empty"><div class="ico">❌</div><p>${msg}</p></div>`;
  }

  // Approve / Reject
  function upd(id, status) {
    fetch(API + '/admin/reviews/' + id, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({status})
    })
    .then(r => r.json())
    .then(d => {
      if (d.success) {
        toast('Review ' + status + '! ✅', 'ok');
        loadStats();
        load('all');
      }
    });
  }

  // Delete
  function del(id) {
    if (!confirm('Delete karna chahte ho?')) return;
    fetch(API + '/admin/reviews/' + id, { method: 'DELETE' })
      .then(r => r.json())
      .then(d => {
        if (d.success) {
          document.getElementById('rc' + id)?.remove();
          toast('Delete ho gaya! 🗑️', 'ok');
          loadStats();
        }
      });
  }

  // Toast
  function toast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type + ' show';
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // Escape HTML
  function x(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
